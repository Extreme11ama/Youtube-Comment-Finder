<!doctype html>
<html>
    <head>    
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="color-scheme" content="light dark">

        <title>Youtube Comment Locater</title>
        <link rel="stylesheet" href="comment_locater_red.css"> 
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
        <style></style>
    </head>
    <body>
        <div class="wrap">            

            <div class="header-text">
                <h1>yt-comment-locater</h1>
                <p>searches comments <span>+ replies</span> · username aware</p>
            </div>

            <div class="api-block">
                <div class="api-toggle" id="api-toggle" onclick="toggleApi()">
                <div class="api-toggle-left">
                    <div class="api-dot" id="api-dot"></div>
                    <span class="api-label" id="api-label">youtube data api v3 key - click to configure</span>
                </div>
                <span class="api-chevron" id="api-chevron">▼</span>
                </div>
                <div class="api-inner" id="api-inner">
                <div class="field" style="margin-top:14px">
                    <label class="field-label">api key</label>
                    <input type="password" id="api-key" placeholder="AIzaSy..."/>
                </div>
                <p class="api-note">
                    get a free key at <a href="https://console.cloud.google.com" target="_blank">console.cloud.google.com</a>
                    → enable youtube data api v3 → create credentials → api key.<br>
                    key is only stored in sessionStorage and never leaves your browser.
                </p>
                </div>
            </div>
            
            <!-- Search -->
            <div class="search-card">
                <div class="field">
                <label class="field-label">video url or id</label>
                <input type="text" id="video-url" placeholder="https://youtube.com/watch?v=... or bare video ID"/>
                </div>
                <div class="input-row">
                <div class="field">
                    <label class="field-label">search keywords</label>
                    <input type="text" id="query" placeholder="keyword, @username, comma-separated"/>
                </div>
                <button class="btn-search" id="search-btn" onclick="startSearch()">search →</button>
                </div>
            
                <div class="toggles">
                    <label class="toggle-pill">
                        <input type="checkbox" id="include-replies" checked/>
                        <span class="pill-check"></span>
                        include replies
                    </label>
                    <label class="toggle-pill">
                        <input type="checkbox" id="username-only"/>
                        <span class="pill-check"></span>
                        username only
                    </label>
                    <div class="sort-inline">
                        <label class="field-label" style="margin-bottom:0; white-space:nowrap; align-self:center;">sort by</label>
                        <select id="sort-by" onchange="renderAllMatches()">
                            <option value="relevance">relevance</option>
                            <option value="time">newest first</option>
                            <option value="likes">most liked</option>
                            <option value="replies">most replies</option>
                        </select>
                    </div>
                </div>
                <!-- <div class="sort-row" style="margin-top:14px; padding-top:14px; border-top: 1px solid var(--border);">
                    <label class="field-label">sort results by</label>
                    <select id="sort-by" onchange="renderAllMatches()">
                        <option value="relevance">relevance</option>
                        <option value="time">newest first</option>
                        <option value="likes">most liked</option>
                        <option value="replies">most replies</option>
                    </select>
                </div> -->
            </div>
            
            <!-- Progress & status -->
            <div class="progress-track" id="progress-wrap">
                <div class="progress-fill" id="progress-bar"></div>
            </div>
            <div class="status-bar" id="status"></div>
            
            <!-- Results -->
            <div id="results-wrap" style="display:none">
                <div class="divider">
                <div class="divider-line"></div>
                <span class="divider-label" id="results-label">results</span>
                <div class="divider-line"></div>
                </div>
                <div id="results"></div>
                <div class="load-more-wrap" id="more-wrap">
                <button class="btn-more" onclick="loadMore()">load more comments →</button>
                </div>
            </div>

        </div>

        </div>
        <script>
            let nextPageToken = null;
            let videoId = null;
            let keywords = [];
            let usernameOnly = false;
            let includeReplies = false;
            let searching = false;
            let totalScanned = 0;
            let totalFound = 0;
            const MAX_PER_BATCH = 5;
            const commentCache = {};
            const cacheComplete = {};
            let totalCommentCount = null;
            const renderedIds = new Set();
            let allMatches = [];

            let apiOpen = false;
            function toggleApi() {
                apiOpen = !apiOpen;
                document.getElementById('api-inner').classList.toggle('open', apiOpen);
                document.getElementById('api-chevron').style.transform = apiOpen ? 'rotate(180deg)' : '';
            }
            
            function updateApiDot() {
                const key = document.getElementById('api-key').value.trim();
                const dot = document.getElementById('api-dot');
                const label = document.getElementById('api-label');
                if (key) {
                dot.classList.add('active');
                label.textContent = 'youtube data api v3 key - configured ✓';
                } else {
                dot.classList.remove('active');
                label.textContent = 'youtube data api v3 key - click to configure';
                }
            }

            function extractVideoId(input) {
                input = input.trim();
                let m;
                if ((m = input.match(/[?&]v=([a-zA-Z0-9_-]{11})/))) return m[1];
                if ((m = input.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/))) return m[1];
                if ((m = input.match(/\/embed\/([a-zA-Z0-9_-]{11})/))) return m[1];
                if ((m = input.match(/\/shorts\/([a-zA-Z0-9_-]{11})/))) return m[1];
                if (/^[a-zA-Z0-9_-]{11}$/.test(input)) return input;
                return null;
            }

            function getApiKey() {
                return document.getElementById('api-key').value.trim();
            }

            async function fetchPage(pageToken) {
                let url = `/.netlify/functions/youtube?endpoint=commentThreads&part=snippet,replies&videoId=${videoId}&maxResults=100`;
                const r = await fetch(url);
                const data = await r.json();
                if (!r.ok) throw new Error(data.error?.message || 'API error');
                return data;
            }

            async function fetchReplies(parentId) {
                const url = `/.netlify/functions/youtube?endpoint=comments&part=snippet&parentId=${parentId}&maxResults=100`;
                const r = await fetch(url);
                if (!r.ok) return [];
                const data = await r.json();
                return (data.items || []).map(item => ({ id: item.id,snippet: item.snippet, isReply: true }));
            }

            function matchesQuery(text, author, kws, usernameOnly) {
                const ltext = text.toLowerCase();
                const lauthor = author.toLowerCase();
                return kws.some(kw => {
                    if (!kw) return false;
                    if (usernameOnly) return lauthor.includes(kw);
                    return ltext.includes(kw) || lauthor.includes(kw);
                });
            }

            async function processPage(pageToken) {
                const data = await fetchPage(pageToken);
                const items = data.items || [];
                let matches = [];
                let allComments = [];

                for (const thread of items) {
                    totalScanned++;
                    const topSnippet = thread.snippet?.topLevelComment?.snippet;
                    if (!topSnippet) continue;

                    allComments.push({ 
                        id: thread.snippet.topLevelComment.id,
                        snippet: topSnippet, isReply: false, 
                        replyCount: thread.snippet.totalReplyCount || 0 });

                    if (matchesQuery(topSnippet.textDisplay || '', topSnippet.authorDisplayName || '', keywords, usernameOnly)) {
                    matches.push({ snippet: topSnippet, isReply: false, replyCount: thread.snippet.totalReplyCount || 0 });
                    }
                    if (includeReplies) {
                        const replyCount = thread.snippet?.totalReplyCount || 0;
                        const cachedReplies = thread.replies?.comments || [];

                        let replies = [];
                        if (replyCount > 0 && cachedReplies.length < replyCount) {
                            replies = await fetchReplies(thread.id);
                        } else {
                            replies = cachedReplies.map(c => ({ id: c.id,snippet: c.snippet, isReply: true }));
                        }

                        replies.forEach(({ id,snippet }) => {
                            totalScanned++;
                            allComments.push({ id,snippet, isReply: true, replyCount: 0 });
                            if (matchesQuery(snippet.textDisplay || '', snippet.authorDisplayName || '', keywords, usernameOnly)) {
                                matches.push({ id,snippet, isReply: true });
                            }
                        });
                    }
                }
                addToCache(videoId, allComments);
                commentCache[videoId].lastPageToken = data.nextPageToken || null;
                //totalScanned = commentCache[videoId].comments.length; not important line

                return { matches, nextPageToken: data.nextPageToken || null };

            }

            async function startSearch() {
                const apiKey = getApiKey();
                if (!apiKey) {
                    if (!apiOpen) toggleApi();
                    setStatus('<span class="err">⚠ Enter your API key above first.</span>');
                    return;
                }

                const urlInput = document.getElementById('video-url').value;
                const queryInput = document.getElementById('query').value.trim();
                videoId = extractVideoId(urlInput);

                if (!videoId) { setStatus('<span class="err">⚠ Couldn\'t extract a video ID from that URL.</span>'); return; }
                if (!queryInput) { setStatus('<span class="err">⚠ Enter at least one keyword.</span>'); return; }

                keywords = queryInput.toLowerCase().split(',').map(s => s.trim()).filter(Boolean);
                usernameOnly = document.getElementById('username-only').checked;
                includeReplies = document.getElementById('include-replies').checked;

                nextPageToken = null;
                totalScanned = 0;
                totalFound = 0;
                renderedIds.clear();
                allMatches = [];
                document.getElementById('results').innerHTML = '';
                document.getElementById('more-wrap').style.display = 'none';
                document.getElementById('search-btn').disabled = true;
                setProgress(5);

                //totalCommentCount = await fetchTotalCommentCount(apiKey);

                const cachedResults = searchCache(videoId, keywords, usernameOnly, includeReplies);

                if (cachedResults !== null) {
                    totalFound = cachedResults.length;
                    totalScanned = commentCache[videoId].comments.length;
                    nextPageToken = commentCache[videoId].lastPageToken;
                    showResultsSection();
                    if (cachedResults.length > 0) {
                        //appendResults(cachedResults);
                        /*const rendered = appendResults(cachedResults);
                        totalFound = rendered;*/
                        const sortBy = document.getElementById('sort-by').value;
                        if (sortBy === 'relevance') {
                            const rendered = appendResults(cachedResults);
                            totalFound = rendered;
                        } else {
                            cachedResults.forEach(m => {
                                if (m.id && renderedIds.has(m.id)) return;
                                if (m.id) renderedIds.add(m.id);
                                allMatches.push(m);
                            });
                            totalFound = allMatches.length;
                            renderAllMatches();
                        }
                    } else {
                        document.getElementById('results').innerHTML = '<div class="empty">No comments matched your search.</div>';
                    }
                    //setStatus(`<span class="count">${totalFound.toLocaleString()}</span> matches in <span class="count">${totalScanned.toLocaleString()}</span> cached comments - instant ⚡`);
                    if (cacheComplete[videoId]) {
                        setStatus(`<span class="count">${totalFound.toLocaleString()}</span> matches in <span class="count">${totalScanned.toLocaleString()}</span> cached comments (fully scanned) ⚡`);
                    } else {
                        setStatus(`<span class="count">${totalFound.toLocaleString()}</span> matches in <span class="count">${totalScanned.toLocaleString()}</span> cached comments — more unseen ⚡`);
                        document.getElementById('more-wrap').style.display = 'block';  // show the button
                    }

                    document.getElementById('search-btn').disabled = false;
                    return;  
                }

                try {
                    await loadMore(true);
                } catch(e) {
                    setStatus(`<span class="err">⚠ ${escHtml(e.message)}</span>`);
                    setProgress(-1);
                }
                document.getElementById('search-btn').disabled = false;
            }

            async function loadMore(isFirst) {
                document.getElementById('more-wrap').style.display = 'none';
                const empty = document.getElementById('results').querySelector('.empty');
                if (empty) empty.remove();
                setProgress(10);

                let batchFound = 0;
                let pagesLoaded = 0;

                while (pagesLoaded < MAX_PER_BATCH) {
                    setStatus(`Scanning comments… <span class="count">${totalScanned.toLocaleString()}</span> checked, <span class="count">${totalFound.toLocaleString()}</span> found`);
                    setProgress(Math.min(90, 10 + pagesLoaded * 15));

                    const { matches, nextPageToken: npt } = await processPage(nextPageToken);
                    nextPageToken = npt;
                    pagesLoaded++;

                    if (matches.length > 0) {
                        showResultsSection();
                        /*appendResults(matches);
                        totalFound += matches.length;
                        batchFound += matches.length;*/
                        const rendered = appendResults(matches);
                        totalFound += rendered;  
                        batchFound += rendered;
                    }

                    if (!nextPageToken) {
                        cacheComplete[videoId] = true;
                        break;
                    }
                }

                setProgress(-1);

                if (totalFound === 0 && !nextPageToken) {
                    document.getElementById('results').innerHTML = '<div class="empty">No comments matched your search.</div>';
                    setStatus(`Scanned <span class="count">${totalScanned.toLocaleString()}</span> comments - no matches found.`);
                } else {
                    const more = nextPageToken ? ' — more available' : ' — end of comments';
                    setStatus(`<span class="count">${totalFound.toLocaleString()}</span> matches found in <span class="count">${totalScanned.toLocaleString()}</span> comments scanned${more}.`);
                    //const ofTotal = totalCommentCount ? ` of ~${Number(totalCommentCount).toLocaleString()}` : '';
                    //setStatus(`<span class="count">${totalFound.toLocaleString()}</span> matches in <span class="count">${totalScanned.toLocaleString()}</span>${ofTotal} comments scanned${more}.`);
                    //if (nextPageToken) document.getElementById('more-wrap').style.display = 'block';
                }
                const sortBy = document.getElementById('sort-by').value;
                if (sortBy === 'relevance') {
                    // already appended directly, nothing to do
                } else {
                    renderAllMatches();
                }
                
                if (nextPageToken) {
                    showResultsSection();
                    document.getElementById('more-wrap').style.display = 'block';
                }
            }

            function appendResults(matches) {
                const container = document.getElementById('results');
                /*matches.forEach(m => {
                    container.insertAdjacentHTML('beforeend', renderComment(m.snippet, m.isReply, keywords, usernameOnly));
                });*/
                let skipped = 0;
                let rendered = 0;
                matches.forEach(m => {
                    if (m.id && renderedIds.has(m.id)) { skipped++; return; }
                    if (m.id) renderedIds.add(m.id);
                    container.insertAdjacentHTML('beforeend', renderComment(m.snippet, m.isReply, keywords, usernameOnly, m.replyCount));
                    allMatches.push(m);
                    rendered++;
                });
                console.log(`appendResults: ${matches.length} incoming, ${skipped} skipped as duplicates, ${matches.length - skipped} rendered`);
                //renderAllMatches();
                return rendered;
            }

            function renderComment(snippet, isReply, kws, usernameOnly, replyCount) {
                const author = snippet.authorDisplayName || '';
                const text = snippet.textDisplay || snippet.textOriginal || '';
                const likes = snippet.likeCount || 0;
                const date = snippet.publishedAt || '';
                const authorUrl = snippet.authorChannelUrl || '#';

                const authorMatch = kws.some(kw => author.toLowerCase().includes(kw));
                const textMatch = !usernameOnly && kws.some(kw => text.toLowerCase().includes(kw));

                const videoLink = `https://www.youtube.com/watch?v=${videoId}`;

                return `
                <div class="result-item ${isReply ? 'is-reply' : ''}">
                <div class="result-meta">
                    <a href="${escHtml(authorUrl)}" target="_blank" class="author ${authorMatch ? 'author-match' : ''}">${escHtml(author)}</a>
                    ${isReply ? '<span class="badge badge-reply">reply</span>' : ''}
                    ${authorMatch ? '<span class="badge badge-match">username match</span>' : ''}
                    <span class="date">${fmtDate(date)}</span>
                </div>
                <div class="comment-text">${highlight(text, kws)}</div>
                <div class="result-footer">
                    <span class="likes"><span>&#128077;</span> ${Number(likes).toLocaleString()}</span>
                    ${!isReply && replyCount > 0 ? `<span class="likes">💬 ${replyCount.toLocaleString()}</span>` : ''}
                    
                </div>
                </div>`;
            }

            function escHtml(s) {
                return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
            }

            function highlight(text, kws) {
                let out = text;
                kws.forEach(kw => {
                    if (!kw) return;
                    const re = new RegExp('(' + kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
                    out = out.replace(re, '<mark>$1</mark>');
                });
                return out;
            }

            function fmtDate(iso) {
                try {
                    return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
                } catch(e) {
                    return '';
                }
            }

            document.getElementById('query').addEventListener('keydown', e => {
                if (e.key === 'Enter') startSearch();
            });

            document.getElementById('video-url').addEventListener('keydown', e => {
                if (e.key === 'Enter') startSearch();
            });

            const savedKey = sessionStorage.getItem('yt_api_key');
            if (savedKey) {
                document.getElementById('api-key').value = savedKey;
                updateApiDot();
            }

            document.getElementById('api-key').addEventListener('input', e => {
                sessionStorage.setItem('yt_api_key', e.target.value);
                updateApiDot();
            });

            function setStatus(msg) {
                document.getElementById('status').innerHTML = msg;
            }

            function setProgress(pct) {
                const wrap = document.getElementById('progress-wrap');
                const bar = document.getElementById('progress-bar');
                if (pct < 0) { wrap.style.display = 'none'; return; }
                wrap.style.display = 'block';
                bar.style.width = Math.min(100, pct) + '%';
            }

            function searchCache(videoId, kws, usernameOnly, includeReplies) {
                const cached = commentCache[videoId];
                if (!cached) return null;

                return cached.comments.filter(({ snippet, isReply }) => {
                    if (isReply && !includeReplies) return false;
                    return matchesQuery(
                    snippet.textDisplay || '',
                    snippet.authorDisplayName || '',
                    kws,
                    usernameOnly
                    );
                });
            }

            function addToCache(videoId, newComments) {
                if (!commentCache[videoId]) {
                    commentCache[videoId] = { comments: [], fetchedAt: Date.now(), lastPageToken: null };
                }
                commentCache[videoId].comments.push(...newComments);
            }

            async function fetchTotalCommentCount(apiKey) {
                const url = `/.netlify/functions/youtube?endpoint=videos&part=statistics&id=${videoId}`;
                const r = await fetch(url);
                if (!r.ok) return null;
                const data = await r.json();
                return data.items?.[0]?.statistics?.commentCount || null;
            }

            function showResultsSection() {
                document.getElementById('results-wrap').style.display = 'block';
            }

            function renderAllMatches() {
                const sortBy = document.getElementById('sort-by').value;
                
                const sorted = [...allMatches].sort((a, b) => {
                    if (sortBy === 'time') return new Date(b.snippet.publishedAt) - new Date(a.snippet.publishedAt);
                    if (sortBy === 'likes') return (b.snippet.likeCount || 0) - (a.snippet.likeCount || 0);
                    if (sortBy === 'replies') return (b.replyCount || 0) - (a.replyCount || 0);
                    return 0; // relevance — original order
                });

                const container = document.getElementById('results');
                container.innerHTML = '';
                sorted.forEach(m => {
                    container.insertAdjacentHTML('beforeend', renderComment(m.snippet, m.isReply, keywords, usernameOnly, m.replyCount));
                });
            }


        </script>
    </body>
</html>
